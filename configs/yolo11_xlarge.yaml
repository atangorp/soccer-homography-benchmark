# configs/yolo11_small.yaml
# YOLO11-Pose Small — lightweight variant
# Framework: Ultralytics
# Estimasi training: ~2–3 jam di T4 GPU

model:
  weights: "yolo11x-pose.pt"       # Pretrained COCO-Pose starting point
  variant: "xlarge"
  family: "yolo11"

training:
  epochs: 500
  imgsz: 640
  batch: 16
  optimizer: "SGD"
  lr0: 0.01
  lrf: 0.01                        # Final lr = lr0 * lrf
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 50                     # Early stopping
  device: "0"                      # GPU index

augmentation:
  mosaic: 0.0                      # Dinonaktifkan — merusak geometric integrity lapangan
  flipud: 0.0
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5

output:
  project: "artifacts/weights/yolo11"
  name: "xlarge"
  save_period: 50                  # Simpan checkpoint setiap N epoch
